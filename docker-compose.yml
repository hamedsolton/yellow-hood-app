services:
  postgres:
    image: postgres:15-alpine
    container_name: yellow-hood-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-yellow_hood_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yellow-hood-network

  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yellow-hood-nextjs
    restart: unless-stopped
    env_file: .env
    ports:
      - "${NEXTJS_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      # Use postgres service name as host (not localhost) so the container can reach the DB
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-yellow_hood_db}?schema=public
    networks:
      - yellow-hood-network
    depends_on:
      - postgres

volumes:
  postgres_data:
    driver: local

networks:
  yellow-hood-network:
    driver: bridge
